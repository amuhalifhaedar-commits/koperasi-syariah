<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Anggota - Admin Koperasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-100 flex">
    <!-- Sidebar -->
    <aside class="w-64 bg-blue-800 text-white min-h-screen fixed hidden md:block">
        <div class="p-6">
            <h1 class="text-2xl font-bold flex items-center gap-3 group">
                <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center shadow-inner group-hover:bg-white/30 transition-all">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                </div>
                <span>Admin <span class="text-blue-300">Panel</span></span>
            </h1>
        </div>
        <nav class="mt-4">
            <a href="dashboard.html" class="block py-3 px-6 hover:bg-blue-700 transition">Dashboard</a>
            <a href="anggota.html" class="block py-3 px-6 bg-blue-900 border-l-4 border-blue-400 font-medium">Data Anggota</a>
            <a href="simpanan.html" class="block py-3 px-6 hover:bg-blue-700 transition">Simpanan</a>
            <a href="pinjaman.html" class="block py-3 px-6 hover:bg-blue-700 transition">Pinjaman</a>
            <a href="angsuran.html" class="block py-3 px-6 hover:bg-blue-700 transition">Angsuran</a>
            <a href="shu.html" class="block py-3 px-6 hover:bg-blue-700 transition">Pembagian SHU</a>
            <a href="notifikasi.html" class="block py-3 px-6 hover:bg-blue-700 transition">Notifikasi</a>
            <button onclick="logout()" class="w-full text-left py-3 px-6 hover:bg-red-600 transition mt-auto block text-red-200">Logout</button>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 md:ml-64 p-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-bold text-gray-800">Kelola Anggota</h2>
            <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold transition flex items-center gap-2 shadow-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Tambah Anggota
            </button>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="text-lg font-bold">Daftar Anggota</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full whitespace-nowrap">
                    <thead class="bg-gray-100 text-gray-600 text-left text-sm uppercase font-semibold">
                        <tr>
                            <th class="px-6 py-4">Nama</th>
                            <th class="px-6 py-4">Email</th>
                            <th class="px-6 py-4">No. HP</th>
                            <th class="px-6 py-4">Alamat</th>
                            <th class="px-6 py-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-100">
                        <tr><td colspan="5" class="px-6 py-4 text-center text-gray-500">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal CRUD Anggota -->
    <div id="anggotaModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl w-full max-w-md overflow-hidden shadow-2xl">
            <div class="p-6 border-b bg-gray-50 flex justify-between items-center">
                <h3 id="modalTitle" class="text-xl font-bold text-gray-800">Tambah Anggota</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <form id="anggotaForm" class="p-6 space-y-4">
                <input type="hidden" id="anggotaId">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                    <input type="text" id="nama" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="email" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div id="passwordField">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password (opsional, default: password123)</label>
                    <input type="password" id="password" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">No. HP</label>
                    <input type="text" id="no_hp" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Alamat</label>
                    <textarea id="alamat" rows="2" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </div>
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-2 rounded-lg transition">Batal</button>
                    <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition shadow-md">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        checkAuth('admin');

        async function loadData() {
            try {
                const data = await apiFetch('/admin/anggota');
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-gray-500">Tidak ada data anggota</td></tr>';
                    return;
                }

                data.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-gray-50 transition-colors';
                    tr.innerHTML = `
                        <td class="px-6 py-4 font-medium text-gray-800">${item.nama}</td>
                        <td class="px-6 py-4 text-gray-600">${item.email}</td>
                        <td class="px-6 py-4 text-gray-600">${item.no_hp || '-'}</td>
                        <td class="px-6 py-4 text-gray-600 truncate max-w-xs" title="${item.alamat}">${item.alamat || '-'}</td>
                        <td class="px-6 py-4 text-center">
                            -
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error(error);
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-red-500">Gagal memuat data</td></tr>';
            }
        }

        function openModal(item = null) {
            const modal = document.getElementById('anggotaModal');
            const form = document.getElementById('anggotaForm');
            const title = document.getElementById('modalTitle');
            const passwordField = document.getElementById('passwordField');
            
            form.reset();
            document.getElementById('anggotaId').value = '';
            
            if (item) {
                title.innerText = 'Edit Anggota';
                document.getElementById('anggotaId').value = item.anggota_id;
                document.getElementById('nama').value = item.nama;
                document.getElementById('email').value = item.email;
                document.getElementById('no_hp').value = item.no_hp || '';
                document.getElementById('alamat').value = item.alamat || '';
                passwordField.classList.add('hidden');
            } else {
                title.innerText = 'Tambah Anggota';
                passwordField.classList.remove('hidden');
            }
            
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('anggotaModal').classList.add('hidden');
        }

        document.getElementById('anggotaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('anggotaId').value;
            const payload = {
                nama: document.getElementById('nama').value,
                email: document.getElementById('email').value,
                no_hp: document.getElementById('no_hp').value,
                alamat: document.getElementById('alamat').value
            };

            if (!id) payload.password = document.getElementById('password').value || 'password123';

            try {
                const method = id ? 'PUT' : 'POST';
                const url = id ? `/admin/anggota/${id}` : '/admin/anggota';
                
                await apiFetch(url, {
                    method: method,
                    body: JSON.stringify(payload)
                });

                showToast(id ? 'Anggota diperbarui' : 'Anggota berhasil ditambahkan');
                closeModal();
                loadData();
            } catch (err) {
                showToast(err.message, 'error');
            }
        });

        async function deleteAnggota(id) {
            if (confirm('Yakin ingin menghapus anggota ini? Data terkait simpanan dan pinjaman akan ikut terhapus.')) {
                try {
                    await apiFetch(`/admin/anggota/${id}`, { method: 'DELETE' });
                    showToast('Anggota berhasil dihapus');
                    loadData();
                } catch (err) {
                    showToast(err.message, 'error');
                }
            }
        }

        loadData();
    </script>
</body>
</html>
</body>
</html>
