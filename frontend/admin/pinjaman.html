<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Pinjaman - Admin Koperasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-100 flex">
    <!-- Sidebar -->
    <aside class="w-64 bg-blue-800 text-white min-h-screen fixed hidden md:block">
        <div class="p-6">
            <h1 class="text-2xl font-bold flex items-center gap-3 group">
                <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center shadow-inner group-hover:bg-white/30 transition-all">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                </div>
                <span>Admin <span class="text-blue-300">Panel</span></span>
            </h1>
        </div>
        <nav class="mt-4">
            <a href="dashboard.html" class="block py-3 px-6 hover:bg-blue-700 transition">Dashboard</a>
            <a href="anggota.html" class="block py-3 px-6 hover:bg-blue-700 transition">Data Anggota</a>
            <a href="simpanan.html" class="block py-3 px-6 hover:bg-blue-700 transition">Simpanan</a>
            <a href="pinjaman.html" class="block py-3 px-6 bg-blue-900 border-l-4 border-blue-400 font-medium">Pinjaman</a>
            <a href="angsuran.html" class="block py-3 px-6 hover:bg-blue-700 transition">Angsuran</a>
            <a href="shu.html" class="block py-3 px-6 hover:bg-blue-700 transition">Pembagian SHU</a>
            <a href="notifikasi.html" class="block py-3 px-6 hover:bg-blue-700 transition">Notifikasi</a>
            <button onclick="logout()" class="w-full text-left py-3 px-6 hover:bg-red-600 transition mt-auto block text-red-200">Logout</button>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 md:ml-64 p-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-bold text-gray-800">Kelola Pinjaman</h2>
            <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold transition flex items-center gap-2 shadow-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Tambah Pinjaman
            </button>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="p-6 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                <h3 class="text-lg font-bold">Daftar Pengajuan Pinjaman</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full whitespace-nowrap">
                    <thead class="bg-gray-100 text-gray-600 text-left text-sm uppercase font-semibold">
                        <tr>
                            <th class="px-6 py-4">Tgl Pengajuan</th>
                            <th class="px-6 py-4">Nama Anggota</th>
                            <th class="px-6 py-4">Jumlah</th>
                            <th class="px-6 py-4">Bunga</th>
                            <th class="px-6 py-4">Tenor</th>
                            <th class="px-6 py-4">Angsuran/Bulan</th>
                            <th class="px-6 py-4">Status</th>
                            <th class="px-6 py-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-100">
                        <tr><td colspan="8" class="px-6 py-4 text-center text-gray-500">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal CRUD Pinjaman -->
    <div id="pinjamanModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl w-full max-w-md overflow-hidden shadow-2xl">
            <div class="p-6 border-b bg-gray-50 flex justify-between items-center">
                <h3 id="modalTitle" class="text-xl font-bold text-gray-800">Tambah Pinjaman</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <form id="pinjamanForm" class="p-6 space-y-4">
                <input type="hidden" id="pinjamanId">
                <div id="anggotaSelectSection">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Pilih Anggota</label>
                    <select id="anggota_id" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="">Pilih Anggota...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Jumlah Pinjaman (Rp)</label>
                    <input type="number" id="jumlah" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" oninput="autoFillBunga()">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Bunga (%) <span class="text-xs text-gray-400">— terisi otomatis</span></label>
                    <input type="number" step="0.1" id="bunga" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-blue-50" value="2.0" oninput="showBungaPreview()">
                </div>
                <!-- Preview Kalkulasi Angsuran -->
                <div id="adminPreviewBox" class="hidden bg-blue-50 p-3 rounded-lg border border-blue-100 text-sm">
                    <p class="font-semibold text-blue-800 mb-1">Estimasi Angsuran</p>
                    <div class="grid grid-cols-2 gap-y-1 text-gray-700">
                        <span>Angsuran/Bulan:</span><span id="adminPrevAngsuran" class="font-bold text-blue-700"></span>
                        <span>Total Bayar:</span><span id="adminPrevTotal" class="font-bold text-blue-700"></span>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tenor (Bulan)</label>
                    <input type="number" id="tenor" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" oninput="showBungaPreview()">
                </div>
                <div id="statusSection" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                    <select id="status" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="pending">Pending</option>
                        <option value="disetujui">Disetujui</option>
                        <option value="ditolak">Ditolak</option>
                        <option value="lunas">Lunas</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal Pengajuan</label>
                    <input type="date" id="tanggal_pengajuan" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-2 rounded-lg transition">Batal</button>
                    <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition shadow-md">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        checkAuth('admin');

        async function loadAnggota() {
            try {
                const data = await apiFetch('/admin/anggota');
                const select = document.getElementById('anggota_id');
                data.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.anggota_id;
                    opt.innerText = item.nama;
                    select.appendChild(opt);
                });
            } catch (err) { console.error(err); }
        }

        async function loadData() {
            try {
                const data = await apiFetch('/admin/pinjaman');
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="px-6 py-4 text-center text-gray-500">Belum ada pengajuan pinjaman</td></tr>';
                    return;
                }

                data.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-gray-50 transition-colors';
                    
                    let bgStatus = 'bg-yellow-100 text-yellow-800';
                    if (item.status === 'disetujui') bgStatus = 'bg-green-100 text-green-800';
                    if (item.status === 'ditolak') bgStatus = 'bg-red-100 text-red-800';
                    if (item.status === 'lunas') bgStatus = 'bg-blue-100 text-blue-800';

                    const totalBayar = parseFloat(item.jumlah) * (1 + parseFloat(item.bunga)/100 * parseInt(item.tenor));
                    const angsuranPerBulan = totalBayar / parseInt(item.tenor);

                    let actions = '';
                    if (item.status === 'pending') {
                        actions = `
                            <div class="flex gap-2 justify-center">
                                <button onclick="updateStatus(${item.id}, 'disetujui')" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded text-xs font-bold transition shadow-sm">Setujui</button>
                                <button onclick="updateStatus(${item.id}, 'ditolak')" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded text-xs font-bold transition shadow-sm">Tolak</button>
                            </div>
                        `;
                    }

                    tr.innerHTML = `
                        <td class="px-6 py-4 text-gray-600">${new Date(item.tanggal_pengajuan).toLocaleDateString()}</td>
                        <td class="px-6 py-4 font-medium text-gray-800">${item.nama}</td>
                        <td class="px-6 py-4 font-bold text-gray-800">Rp ${Number(item.jumlah).toLocaleString('id-ID')}</td>
                        <td class="px-6 py-4 text-gray-600">${item.bunga}%/bln</td>
                        <td class="px-6 py-4 text-gray-600">${item.tenor} Bulan</td>
                        <td class="px-6 py-4 font-semibold text-indigo-700">Rp ${Math.round(angsuranPerBulan).toLocaleString('id-ID')}</td>
                        <td class="px-6 py-4"><span class="px-3 py-1 rounded-full text-xs font-semibold uppercase ${bgStatus}">${item.status}</span></td>
                        <td class="px-6 py-4 text-center">${actions}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error(error);
                tbody.innerHTML = '<tr><td colspan="8" class="px-6 py-4 text-center text-red-500 font-bold">Gagal memuat data pencatatan: ' + error.message + '</td></tr>';
            }
        }

        function openModal(item = null) {
            const modal = document.getElementById('pinjamanModal');
            const form = document.getElementById('pinjamanForm');
            const title = document.getElementById('modalTitle');
            const selectSection = document.getElementById('anggotaSelectSection');
            const statusSection = document.getElementById('statusSection');
            
            form.reset();
            document.getElementById('pinjamanId').value = '';
            document.getElementById('tanggal_pengajuan').value = new Date().toISOString().split('T')[0];
            
            if (item) {
                title.innerText = 'Edit Pinjaman';
                document.getElementById('pinjamanId').value = item.id;
                document.getElementById('jumlah').value = item.jumlah;
                document.getElementById('bunga').value = item.bunga;
                document.getElementById('tenor').value = item.tenor;
                document.getElementById('status').value = item.status;
                document.getElementById('tanggal_pengajuan').value = new Date(item.tanggal_pengajuan).toISOString().split('T')[0];
                selectSection.classList.add('hidden');
                statusSection.classList.remove('hidden');
                document.getElementById('anggota_id').removeAttribute('required');
            } else {
                title.innerText = 'Tambah Pinjaman';
                selectSection.classList.remove('hidden');
                statusSection.classList.add('hidden');
                document.getElementById('anggota_id').setAttribute('required', 'required');
            }
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('pinjamanModal').classList.add('hidden');
        }

        document.getElementById('pinjamanForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('pinjamanId').value;
            const payload = {
                jumlah: document.getElementById('jumlah').value,
                bunga: document.getElementById('bunga').value,
                tenor: document.getElementById('tenor').value,
                tanggal_pengajuan: document.getElementById('tanggal_pengajuan').value,
                status: document.getElementById('status').value
            };

            if (!id) payload.anggota_id = document.getElementById('anggota_id').value;

            try {
                const method = id ? 'PUT' : 'POST';
                const url = id ? `/admin/pinjaman/${id}` : '/admin/pinjaman';
                await apiFetch(url, { method, body: JSON.stringify(payload) });
                showToast(id ? 'Pinjaman diperbarui' : 'Pinjaman berhasil ditambahkan');
                closeModal();
                loadData();
            } catch (err) { showToast(err.message, 'error'); }
        });

        async function updateStatus(id, status) {
            try {
                // Hapus confirm sementara untuk memastikan tombol berjalan
                await apiFetch(`/admin/pinjaman/${id}/status`, {
                    method: 'PUT',
                    body: JSON.stringify({ status })
                });
                showToast(`Pinjaman ${status === 'disetujui' ? 'disetujui' : 'ditolak'}`);
                loadData();
            } catch (error) {
                console.error("Update Status Error:", error);
                showToast(error.message, 'error');
            }
        }

        async function deletePinjaman(id) {
            if (confirm('Yakin ingin menghapus data pinjaman ini?')) {
                try {
                    await apiFetch(`/admin/pinjaman/${id}`, { method: 'DELETE' });
                    showToast('Pinjaman berhasil dihapus');
                    loadData();
                } catch (err) { showToast(err.message, 'error'); }
            }
        }

        loadAnggota();
        loadData();

        // --- Kalkulasi Bunga Otomatis (Admin) ---
        function hitungBunga(jumlah) {
            if (jumlah <= 1000000)        return 1.0;
            else if (jumlah <= 5000000)   return 1.5;
            else if (jumlah <= 10000000)  return 2.0;
            else if (jumlah <= 20000000)  return 2.5;
            else                          return 3.0;
        }
        function autoFillBunga() {
            const jumlah = parseFloat(document.getElementById('jumlah').value);
            if (!jumlah || jumlah <= 0) return;
            document.getElementById('bunga').value = hitungBunga(jumlah);
            showBungaPreview();
        }
        function showBungaPreview() {
            const jumlah = parseFloat(document.getElementById('jumlah').value);
            const tenor  = parseInt(document.getElementById('tenor').value);
            const bunga  = parseFloat(document.getElementById('bunga').value);
            const box = document.getElementById('adminPreviewBox');
            if (!jumlah || !tenor || !bunga) { box.classList.add('hidden'); return; }
            const totalBayar = jumlah * (1 + bunga/100 * tenor);
            const angsuranPerBulan = totalBayar / tenor;
            document.getElementById('adminPrevAngsuran').textContent = `Rp ${Math.round(angsuranPerBulan).toLocaleString('id-ID')}`;
            document.getElementById('adminPrevTotal').textContent    = `Rp ${Math.round(totalBayar).toLocaleString('id-ID')}`;
            box.classList.remove('hidden');
        }
    </script>
</body>
</html>
